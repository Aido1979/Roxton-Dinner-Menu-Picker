<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #9b1c1c;
  --red-dark: #6b0f0f;
  --red-light: #c0392b;
  --gold: #c9962a;
  --gold-light: #e8b84b;
  --gold-pale: #f5e6c0;
  --paper: #fdf6e8;
  --paper-dark: #f0e4c4;
  --ink: #1a0a0a;
  --ink-mid: #4a2020;
  --ink-light: #7a4a3a;
  --white: #fffdf7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(155,28,28,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 100% 100%, rgba(201,150,42,0.07) 0%, transparent 60%);
}

/* TOP BORDER */
.top-border {
  height: 6px;
  background: linear-gradient(90deg, var(--red-dark), var(--red), var(--gold), var(--gold-light), var(--gold), var(--red), var(--red-dark));
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 24px 28px;
  position: relative;
  border-bottom: 1px solid rgba(201,150,42,0.3);
  background: linear-gradient(180deg, rgba(155,28,28,0.04) 0%, transparent 100%);
}

.lantern-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 20px;
}

.lantern {
  font-size: 28px;
  animation: sway 3s ease-in-out infinite;
}

.lantern:nth-child(2) { animation-delay: 0.5s; }
.lantern:nth-child(3) { animation-delay: 1s; }

@keyframes sway {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--red-dark);
  letter-spacing: 3px;
  line-height: 1.2;
}

h1 .sub {
  display: block;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.38em;
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 6px;
}

.header-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 16px auto 0;
  max-width: 400px;
}

.header-divider::before,
.header-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}

.header-divider::after {
  background: linear-gradient(90deg, var(--gold), transparent);
}

.header-divider span {
  color: var(--gold);
  font-size: 14px;
}

/* NAME BAR */
.name-bar {
  background: var(--white);
  border-bottom: 1px solid rgba(201,150,42,0.25);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(155,28,28,0.08);
}

.name-bar label {
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--ink-mid);
  white-space: nowrap;
}

.name-bar input {
  padding: 8px 14px;
  border: 1.5px solid rgba(201,150,42,0.4);
  border-radius: 6px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  background: var(--paper);
  color: var(--ink);
  width: 200px;
  transition: all 0.2s;
}

.name-bar input:focus {
  outline: none;
  border-color: var(--gold);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(201,150,42,0.12);
}

.name-bar input::placeholder { color: #bbb; }

.name-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--red-dark);
  color: var(--gold-light);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.name-pill:hover { background: var(--red); }

.name-pill .x { font-size: 11px; opacity: 0.7; }

/* MAIN LAYOUT */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px 60px;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 28px;
  align-items: start;
}

@media (max-width: 800px) {
  .main { grid-template-columns: 1fr; }
  .order-sidebar { order: -1; }
}

/* CATEGORY TABS */
.category-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(201,150,42,0.35);
  background: var(--white);
  color: var(--ink-mid);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.tab-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.tab-btn.active {
  background: var(--red-dark);
  border-color: var(--red-dark);
  color: var(--gold-light);
}

/* MENU SECTION */
.menu-section { display: none; }
.menu-section.visible { display: block; }

.section-heading {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--red-dark);
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(201,150,42,0.3);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,150,42,0.4), transparent);
}

/* DISH CARDS */
.dish-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin-bottom: 32px;
}

.dish-card {
  background: var(--white);
  border: 1.5px solid rgba(201,150,42,0.2);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}

.dish-card:hover {
  border-color: rgba(201,150,42,0.5);
  box-shadow: 0 3px 12px rgba(155,28,28,0.1);
  transform: translateY(-1px);
}

.dish-card.has-orders {
  border-color: var(--gold);
  background: linear-gradient(135deg, var(--white), var(--gold-pale));
}

.dish-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
}

.dish-chinese {
  font-size: 11px;
  color: var(--ink-light);
  font-family: 'Noto Serif SC', serif;
}

.dish-price {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}

.dish-orders {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}

.order-tag {
  background: var(--red-dark);
  color: var(--gold-light);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

.order-tag .remove-tag {
  cursor: pointer;
  opacity: 0.7;
  font-size: 10px;
  background: none;
  border: none;
  color: inherit;
  padding: 0;
  line-height: 1;
}

.order-tag .remove-tag:hover { opacity: 1; }

.add-order-btn {
  align-self: flex-start;
  margin-top: 4px;
  padding: 5px 12px;
  background: none;
  border: 1.5px solid rgba(201,150,42,0.4);
  border-radius: 6px;
  color: var(--gold);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.add-order-btn:hover {
  background: var(--red-dark);
  border-color: var(--red-dark);
  color: var(--gold-light);
}

/* SIDEBAR */
.order-sidebar {
  position: sticky;
  top: 70px;
}

.sidebar-card {
  background: var(--white);
  border: 1.5px solid rgba(201,150,42,0.3);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(155,28,28,0.08);
}

.sidebar-header {
  background: var(--red-dark);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  color: var(--gold-light);
  letter-spacing: 2px;
}

.refresh-btn {
  background: none;
  border: 1px solid rgba(232,184,75,0.4);
  color: var(--gold-light);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover { background: rgba(232,184,75,0.15); border-color: var(--gold-light); }

.sidebar-body { padding: 16px; }

.order-summary-item {
  padding: 10px 0;
  border-bottom: 1px dashed rgba(201,150,42,0.25);
  animation: fadeIn 0.3s ease;
}

.order-summary-item:last-child { border-bottom: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.osi-dish {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
  margin-bottom: 4px;
}

.osi-who {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.osi-tag {
  font-size: 11px;
  background: var(--gold-pale);
  color: var(--ink-mid);
  padding: 2px 7px;
  border-radius: 8px;
  border: 1px solid rgba(201,150,42,0.3);
}

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: #bbb;
  font-size: 13px;
  font-style: italic;
}

.empty-state .icon { font-size: 28px; margin-bottom: 8px; display: block; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid rgba(201,150,42,0.2);
  background: var(--paper);
  font-size: 11px;
  color: #bbb;
  text-align: center;
}

/* HOST PANEL */
.host-section {
  max-width: 1100px;
  margin: 0 auto 40px;
  padding: 0 20px;
}

details {
  background: var(--white);
  border: 1px solid rgba(201,150,42,0.25);
  border-radius: 8px;
  overflow: hidden;
}

summary {
  padding: 10px 18px;
  font-size: 12px;
  color: var(--ink-light);
  cursor: pointer;
  letter-spacing: 1px;
  user-select: none;
}

.host-controls {
  padding: 14px 18px;
  border-top: 1px solid rgba(201,150,42,0.2);
  display: flex;
  gap: 10px;
}

.danger-btn {
  padding: 7px 16px;
  background: #fdecea;
  color: var(--red);
  border: 1px solid #ef9a9a;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.danger-btn:hover { background: var(--red); color: white; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--red-dark);
  color: var(--gold-light);
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* LOADING */
.loading-overlay {
  text-align: center;
  padding: 20px;
  color: var(--gold);
  font-size: 13px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: #ccc;
  border-top: 1px solid rgba(201,150,42,0.15);
}
</style>

// ── STORAGE ─────────────────────────────────────────────────────────────────
const BIN_ID = '6a11e7e86877513b27bef100';
const API_KEY = '$2a$10$JcicJeCt72663aRm7vStcuUkC1ue3Pdi1astd.IxkMd3AIHjbKokm';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = {
  'Content-Type': 'application/json',
  'X-Master-Key': API_KEY,
  'X-Bin-Versioning': 'false'
};

// orders: { dishKey: [ { name, qty } ] }
async function getData() {
  const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
  if (!res.ok) throw new Error('fetch failed');
  const json = await res.json();
  return json.record.orders || {};
}

async function saveData(orders) {
  const res = await fetch(BIN_URL, {
    method: 'PUT',
    headers: HEADERS,
    body: JSON.stringify({ orders })
  });
  if (!res.ok) throw new Error('save failed');
}

// ── STATE ────────────────────────────────────────────────────────────────────
let currentName = localStorage.getItem('newsky_name') || '';
let ordersCache = {};

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── NAME ─────────────────────────────────────────────────────────────────────
function setName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { toast('Please enter your name first'); return; }
  currentName = val;
  localStorage.setItem('newsky_name', val);
  updateNameBar();
}

function clearName() {
  currentName = '';
  localStorage.removeItem('newsky_name');
  document.getElementById('name-input').value = '';
  updateNameBar();
}

function updateNameBar() {
  const pill = document.getElementById('name-display');
  const input = document.getElementById('name-input');
  if (currentName) {
    document.getElementById('name-text').textContent = currentName;
    pill.style.display = 'inline-flex';
    input.style.display = 'none';
    document.querySelector('[onclick="setName()"]').style.display = 'none';
  } else {
    pill.style.display = 'none';
    input.style.display = '';
    document.querySelector('[onclick="setName()"]').style.display = '';
  }
}

// ── MENU RENDERING ────────────────────────────────────────────────────────────
function dishKey(catName, dishName) {
  return catName + '::' + dishName;
}

function buildMenu() {
  const tabsEl = document.getElementById('cat-tabs');
  const sectionsEl = document.getElementById('menu-sections');
  tabsEl.innerHTML = '';
  sectionsEl.innerHTML = '';

  MENU.forEach((cat, ci) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab-btn' + (ci === 0 ? ' active' : '');
    tab.textContent = cat.cat;
    tab.onclick = () => switchTab(ci);
    tabsEl.appendChild(tab);

    // Section
    const sec = document.createElement('div');
    sec.className = 'menu-section' + (ci === 0 ? ' visible' : '');
    sec.id = 'sec-' + ci;

    const heading = document.createElement('div');
    heading.className = 'section-heading';
    heading.textContent = cat.cat;
    sec.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'dish-grid';

    cat.items.forEach(dish => {
      const key = dishKey(cat.cat, dish.name);
      const card = document.createElement('div');
      card.className = 'dish-card';
      card.id = 'card-' + CSS.escape(key);
      card.innerHTML = `
        <div class="dish-name">${dish.name}</div>
        ${dish.cn ? `<div class="dish-chinese">${dish.cn}</div>` : ''}
        <div class="dish-price">${dish.price}</div>
        <div class="dish-orders" id="orders-${CSS.escape(key)}"></div>
        <button class="add-order-btn" onclick="addOrder('${esc(key)}')">+ I want this</button>
      `;
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    sectionsEl.appendChild(sec);
  });
}

function switchTab(ci) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.className = 'tab-btn' + (i === ci ? ' active' : '');
  });
  document.querySelectorAll('.menu-section').forEach((s, i) => {
    s.className = 'menu-section' + (i === ci ? ' visible' : '');
  });
}

// ── ORDER LOGIC ───────────────────────────────────────────────────────────────
async function addOrder(key) {
  if (!currentName) { toast('Set your name first (top of page)'); return; }
  try {
    const orders = await getData();
    if (!orders[key]) orders[key] = [];
    const existing = orders[key].find(o => o.name === currentName);
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      orders[key].push({ name: currentName, qty: 1 });
    }
    ordersCache = orders;
    await saveData(orders);
    renderOrders(orders);
    toast('Added!');
  } catch(e) {
    toast('Error — please try again');
    console.error(e);
  }
}

async function removePersonOrder(key, personName) {
  if (!confirm(`Remove ${personName} from this dish?`)) return;
  try {
    const orders = await getData();
    if (orders[key]) {
      orders[key] = orders[key].filter(o => o.name !== personName);
      if (orders[key].length === 0) delete orders[key];
    }
    ordersCache = orders;
    await saveData(orders);
    renderOrders(orders);
    toast('Removed');
  } catch(e) {
    toast('Error — please try again');
  }
}

function renderOrders(orders) {
  // Update dish cards
  MENU.forEach(cat => {
    cat.items.forEach(dish => {
      const key = dishKey(cat.cat, dish.name);
      const el = document.getElementById('orders-' + CSS.escape(key));
      const card = document.getElementById('card-' + CSS.escape(key));
      if (!el) return;

      const dishOrders = orders[key] || [];
      el.innerHTML = '';
      dishOrders.forEach(o => {
        const tag = document.createElement('span');
        tag.className = 'order-tag';
        const label = o.qty > 1 ? `${o.name} ×${o.qty}` : o.name;
        tag.innerHTML = `${esc(label)} <button class="remove-tag" title="Remove" onclick="removePersonOrder('${esc(key)}','${esc(o.name)}')">✕</button>`;
        el.appendChild(tag);
      });

      if (card) {
        card.className = 'dish-card' + (dishOrders.length > 0 ? ' has-orders' : '');
      }
    });
  });

  // Update sidebar
  const listEl = document.getElementById('order-list');
  const keys = Object.keys(orders).filter(k => orders[k] && orders[k].length > 0);

  if (keys.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><span class="icon">🥢</span>No dishes yet — start picking!</div>';
    document.getElementById('sidebar-footer').textContent = 'No items yet · Auto-refreshes every 30s';
    return;
  }

  listEl.innerHTML = '';
  keys.forEach(key => {
    const parts = key.split('::');
    const dishName = parts[1] || key;
    const people = orders[key];

    const item = document.createElement('div');
    item.className = 'order-summary-item';
    const whoHtml = people.map(o => {
      const label = o.qty > 1 ? `${o.name} ×${o.qty}` : o.name;
      return `<span class="osi-tag">${esc(label)}</span>`;
    }).join('');
    item.innerHTML = `<div class="osi-dish">${esc(dishName)}</div><div class="osi-who">${whoHtml}</div>`;
    listEl.appendChild(item);
  });

  const totalDishes = keys.length;
  const totalOrders = Object.values(orders).reduce((sum, arr) => sum + (arr ? arr.length : 0), 0);
  document.getElementById('sidebar-footer').textContent = `${totalDishes} dish${totalDishes !== 1 ? 'es' : ''} · ${totalOrders} order${totalOrders !== 1 ? 's' : ''} · Auto-refreshes every 30s`;
}

async function loadOrders() {
  try {
    const orders = await getData();
    ordersCache = orders;
    renderOrders(orders);
  } catch(e) {
    document.getElementById('order-list').innerHTML = '<div class="empty-state">⚠️ Could not load orders</div>';
  }
}

async function clearAll() {
  if (!confirm('Clear the ENTIRE order list? This cannot be undone.')) return;
  try {
    await saveData({});
    ordersCache = {};
    renderOrders({});
    toast('Order list cleared');
  } catch(e) {
    toast('Error clearing list');
  }
}

function esc(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
if (currentName) {
  document.getElementById('name-input').value = currentName;
}
updateNameBar();
buildMenu();
loadOrders();
setInterval(loadOrders, 30000);

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setName();
});
</script>
